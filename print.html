<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>물리학 Ⅱ · 학습 노트 (인쇄용)</title>
<meta name="description" content="물리학 II 개념·공식·기본/심화 문제·논술형을 한 권으로 정리한 인쇄용 학습 노트" />

<!-- Fonts (브라우저 인쇄 시 CDN 사용) -->
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

<!-- KaTeX -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" crossorigin="anonymous" />
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" crossorigin="anonymous"></script>

<style>
  :root {
    --ink: #16181d; --soft: #4b515e; --faint: #7a8190;
    --line: #d7dce4; --line2: #e9edf3; --accent: #1f5fd6; --deep: #0f2c5c;
    --basic: #0d7d72; --basic-bg: #eef8f6;
    --adv: #b9650a; --adv-bg: #fdf4e7;
    --essay: #5b3fc0; --essay-bg: #f1ecfb;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    font-family: "Pretendard", "Space Grotesk", system-ui, sans-serif;
    color: var(--ink);
    background: #f3f5f8;
    font-size: 14px;
    line-height: 1.6;
    -webkit-print-color-adjust: exact; print-color-adjust: exact;
  }
  .display { font-family: "Space Grotesk", "Pretendard", sans-serif; }
  .mono { font-family: "JetBrains Mono", monospace; }

  /* toolbar (화면 전용) */
  .toolbar {
    position: sticky; top: 0; z-index: 10;
    background: #fff; border-bottom: 1px solid var(--line);
    padding: 12px 18px; display: flex; gap: 12px; align-items: center;
  }
  .toolbar .t-title { font-weight: 700; }
  .toolbar .t-hint { color: var(--faint); font-size: 12.5px; }
  .print-btn {
    margin-left: auto; background: var(--accent); color: #fff; border: none;
    font-weight: 600; font-size: 14px; padding: 9px 18px; border-radius: 9px; cursor: pointer;
  }
  .print-btn:hover { background: var(--deep); }

  .doc { max-width: 820px; margin: 0 auto; padding: 28px 32px 60px; background: #fff; }

  /* cover */
  .cover { text-align: center; padding: 60px 0 30px; border-bottom: 2px solid var(--ink); margin-bottom: 8px; }
  .cover .badge {
    display: inline-grid; place-items: center; width: 56px; height: 56px; margin: 0 auto 16px;
    background: var(--deep); color: #fff; border-radius: 14px; font-family: "Space Grotesk"; font-weight: 700; font-size: 28px;
  }
  .cover h1 { font-family: "Space Grotesk"; font-size: 34px; margin: 0 0 6px; letter-spacing: -0.5px; }
  .cover .sub { color: var(--soft); font-size: 15px; }
  .cover .meta { color: var(--faint); font-size: 12.5px; margin-top: 14px; }

  .chapter { break-before: page; padding-top: 6px; }
  .chapter.first { break-before: auto; }
  .chapter-h {
    font-family: "Space Grotesk"; font-size: 24px; font-weight: 700;
    border-bottom: 2px solid var(--accent); padding-bottom: 8px; margin: 18px 0 4px;
    display: flex; align-items: baseline; gap: 12px;
  }
  .chapter-h .cnum {
    font-family: "JetBrains Mono"; font-size: 14px; color: #fff; background: var(--accent);
    padding: 2px 9px; border-radius: 6px;
  }
  .chapter-sub { color: var(--faint); font-size: 13px; margin: 0 0 18px; }

  .topic { margin-bottom: 26px; break-inside: avoid-page; }
  .topic-h {
    font-family: "Space Grotesk"; font-size: 19px; font-weight: 700; margin: 22px 0 2px;
    padding-left: 11px; border-left: 4px solid var(--deep);
  }
  .topic-h .tnum { color: var(--accent); }
  .topic-tag { color: var(--soft); font-size: 13px; margin: 0 0 12px 11px; }

  .sec-label {
    font-family: "JetBrains Mono"; font-size: 11.5px; letter-spacing: 1px; text-transform: uppercase;
    color: var(--faint); margin: 16px 0 8px; padding-bottom: 3px; border-bottom: 1px dashed var(--line);
  }

  /* concept */
  .concept { margin-bottom: 12px; break-inside: avoid; }
  .concept-name { font-weight: 700; font-size: 15px; margin: 8px 0 4px; }
  .concept-name::before { content: "▍"; color: var(--accent); margin-right: 5px; }
  .concept-body { margin: 0 0 8px; color: #2a2f39; font-size: 13.5px; }
  .concept-body b { color: var(--ink); }
  .formula {
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    background: #f7f9fc; border: 1px solid var(--line2); border-left: 3px solid var(--accent);
    border-radius: 8px; padding: 8px 14px; margin: 6px 0;
  }
  .formula .fx { font-size: 15px; }
  .formula .fd { color: var(--soft); font-size: 12.5px; }

  /* problems */
  .q { margin: 0 0 9px; break-inside: avoid; }
  .q.long { break-inside: auto; }
  .q-head { display: flex; gap: 9px; align-items: baseline; }
  .q-num {
    font-family: "JetBrains Mono"; font-weight: 700; font-size: 11.5px; flex-shrink: 0;
    padding: 2px 7px; border-radius: 5px;
  }
  .q.basic .q-num { color: var(--basic); background: var(--basic-bg); }
  .q.adv .q-num { color: var(--adv); background: var(--adv-bg); }
  .q-text { margin: 0; font-size: 13.5px; }
  .ans {
    margin: 5px 0 0 28px; padding: 7px 12px; border-radius: 7px; font-size: 13px; line-height: 1.65;
  }
  .q.basic .ans { background: var(--basic-bg); border: 1px solid #cfe9e4; }
  .q.adv .ans { background: var(--adv-bg); border: 1px solid #f2ddbf; }
  .ans .lab {
    font-family: "JetBrains Mono"; font-size: 10px; letter-spacing: 0.5px; font-weight: 700;
    display: inline-block; margin-right: 6px;
  }
  .q.basic .ans .lab { color: var(--basic); }
  .q.adv .ans .lab { color: var(--adv); }

  /* essay */
  .essay { margin: 0 0 14px; break-inside: avoid; border: 1px solid var(--line); border-top: 3px solid var(--essay); border-radius: 9px; padding: 12px 14px; }
  .essay-q { font-weight: 600; font-size: 13.5px; margin: 0 0 9px; }
  .essay-q .enum { font-family: "JetBrains Mono"; font-size: 11px; font-weight: 700; color: var(--essay); background: var(--essay-bg); padding: 2px 8px; border-radius: 6px; margin-right: 8px; }
  .step { margin: 6px 0; padding-left: 10px; border-left: 2px solid var(--essay-bg); font-size: 13px; }
  .step .sname { font-weight: 700; color: var(--essay); font-size: 12px; }

  .katex { font-size: 1.02em; }

  @media print {
    body { background: #fff; font-size: 11pt; }
    .toolbar { display: none; }
    .doc { max-width: none; margin: 0; padding: 0; }
    @page { size: A4; margin: 15mm 14mm 16mm; }
    a { color: inherit; text-decoration: none; }
  }
</style>
</head>
<body>
  <div class="toolbar">
    <span class="t-title">물리학 Ⅱ 학습 노트</span>
    <span class="t-hint">브라우저에서 <b>인쇄 → 대상: PDF로 저장</b>(A4)으로 출력하세요. 시뮬레이션은 포함되지 않습니다.</span>
    <button class="print-btn" onclick="window.print()">인쇄 / PDF로 저장</button>
  </div>
  <div class="doc" id="doc"></div>

  <script src="data.js"></script>
  <script>
  (function () {
    "use strict";
    function el(tag, cls, html) {
      const n = document.createElement(tag);
      if (cls) n.className = cls;
      if (html != null) n.innerHTML = html;
      return n;
    }
    const doc = document.getElementById("doc");

    // cover
    let totBasic = 0, totAdv = 0, totEssay = 0, totTopic = 0;
    CURRICULUM.forEach((ch) => ch.topics.forEach((tp) => {
      totTopic++; totBasic += (tp.basic || []).length; totAdv += (tp.advanced || []).length; totEssay += (tp.essays || []).length;
    }));
    const cover = el("div", "cover");
    cover.innerHTML =
      '<div class="badge">Ⅱ</div>' +
      '<h1>물리학 Ⅱ 학습 노트</h1>' +
      '<div class="sub">개념·공식 정리 · 기본/심화 문제 풀이 · 논술형 3단계</div>' +
      '<div class="meta">단원 ' + CURRICULUM.length + ' · 주제 ' + totTopic + ' · 기본 ' + totBasic + '문항 · 심화 ' + totAdv + '문항 · 논술 ' + totEssay + '문항</div>';
    doc.appendChild(cover);

    let topicNo = 0;
    CURRICULUM.forEach((ch, ci) => {
      const chapter = el("div", "chapter" + (ci === 0 ? " first" : ""));
      const h = el("div", "chapter-h");
      h.innerHTML = '<span class="cnum">' + String(ci + 1).padStart(2, "0") + '</span><span>' + ch.title + '</span>';
      chapter.appendChild(h);
      if (ch.subtitle) chapter.appendChild(el("p", "chapter-sub", ch.subtitle));

      ch.topics.forEach((tp) => {
        topicNo++;
        const t = el("div", "topic");
        const th = el("div", "topic-h");
        th.innerHTML = '<span class="tnum">' + String(topicNo).padStart(2, "0") + '.</span> ' + tp.title;
        t.appendChild(th);
        if (tp.tagline) t.appendChild(el("p", "topic-tag", tp.tagline));

        // 개념·공식
        if ((tp.concepts || []).length) {
          t.appendChild(el("div", "sec-label", "개념 · 공식"));
          tp.concepts.forEach((c) => {
            const block = el("div", "concept");
            block.appendChild(el("div", "concept-name", c.name));
            if (c.body) block.appendChild(el("p", "concept-body", c.body));
            (c.formulas || []).forEach((f) => {
              const fr = el("div", "formula");
              fr.appendChild(el("div", "fx", "$$" + f.latex + "$$"));
              if (f.desc) fr.appendChild(el("div", "fd", f.desc));
              block.appendChild(fr);
            });
            t.appendChild(block);
          });
        }

        // 기본 문제
        if ((tp.basic || []).length) {
          t.appendChild(el("div", "sec-label", "기본 문제"));
          tp.basic.forEach((p, i) => {
            const q = el("div", "q basic");
            const head = el("div", "q-head");
            head.appendChild(el("span", "q-num", "Q" + (i + 1)));
            head.appendChild(el("p", "q-text", p.q));
            q.appendChild(head);
            q.appendChild(el("div", "ans", '<span class="lab">정답</span>' + p.a));
            t.appendChild(q);
          });
        }

        // 심화 문제
        if ((tp.advanced || []).length) {
          t.appendChild(el("div", "sec-label", "심화 문제 (상세 풀이)"));
          tp.advanced.forEach((p, i) => {
            const q = el("div", "q adv long");
            const head = el("div", "q-head");
            head.appendChild(el("span", "q-num", "심화 " + (i + 1)));
            head.appendChild(el("p", "q-text", p.q));
            q.appendChild(head);
            q.appendChild(el("div", "ans", '<span class="lab">풀이</span>' + p.a));
            t.appendChild(q);
          });
        }

        // 논술형
        if ((tp.essays || []).length) {
          t.appendChild(el("div", "sec-label", "논술형"));
          const STEP = ["1단계 · 핵심 개념", "2단계 · 풀이 전략", "3단계 · 모범 답안"];
          tp.essays.forEach((es, ei) => {
            const card = el("div", "essay");
            card.appendChild(el("p", "essay-q", '<span class="enum">논술 ' + (ei + 1) + "</span>" + es.q));
            (es.steps || []).forEach((s, si) => {
              card.appendChild(el("div", "step", '<span class="sname">' + (STEP[si] || ("단계 " + (si + 1))) + "</span> · " + s));
            });
            t.appendChild(card);
          });
        }

        chapter.appendChild(t);
      });
      doc.appendChild(chapter);
    });

    function renderAll() {
      if (typeof renderMathInElement !== "function") { window.__ready = true; return; }
      try {
        renderMathInElement(doc, {
          delimiters: [
            { left: "$$", right: "$$", display: true },
            { left: "$", right: "$", display: false },
          ],
          throwOnError: false,
        });
      } catch (e) {}
      window.__ready = true;
    }
    if (document.readyState === "complete") renderAll();
    else window.addEventListener("load", renderAll);
  })();
  </script>
</body>
</html>
